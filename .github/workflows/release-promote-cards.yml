name: Promote released cards on merge to main

# When a release merges to main, move each shipped DL's tracking card (board 8,
# the bridge's tracking board) to "released to main" (stage 53). The DL set is
# derived DETERMINISTICALLY from git (`git log <prev-tag>..HEAD`) by
# promote-released-cards, consumed as the SHA-pinned agent-board-toolkit
# composite action (uses: .../promote@<sha>; docs/INSTALL.md §6a in that repo).
# No copy is vendored here — the pin is bumped by dependabot. Closes the gap
# where a bundled release PR carries no single DL token. Board/stage/api come
# from .release-pr.json (.promote). Isolated so a card hiccup never blocks the release.
#
# workflow_dispatch lets an operator exercise the path on demand — dry-run by
# default, so it moves nothing.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dls:
        description: 'DLs to promote (comma-separated). Blank = derive from the git range.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — report only, move nothing.'
        type: boolean
        required: false
        default: true

permissions:
  contents: read

concurrency:
  group: release-promote-cards-${{ github.sha }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      # Preflight the required repo variables (out-of-band from the PR-editable
      # .release-pr.json) so the failure is a clear ::error:: rather than the
      # action's script fail-closing on an empty value. The promote step itself
      # is the SHA-pinned agent-board-toolkit composite action (docs/INSTALL.md §6a) —
      # no vendored copy in this repo.
      - name: Preflight required repo variables
        env:
          KANBAN_API_BASE: ${{ vars.KANBAN_API_BASE }}
          KANBAN_EXPECTED_HOST: ${{ vars.KANBAN_EXPECTED_HOST }}
        run: |
          if [ -z "$KANBAN_API_BASE" ]; then
            echo "::error::vars.KANBAN_API_BASE is not set — refusing to promote against the .release-pr.json placeholder host. Set it with: gh variable set KANBAN_API_BASE --repo <owner>/<repo> --body 'https://<kanban-host>/api/v3'" >&2
            exit 1
          fi
          if [ -z "$KANBAN_EXPECTED_HOST" ]; then
            echo "::error::vars.KANBAN_EXPECTED_HOST is not set — promote requires it to validate the api host before sending the writeback token" >&2
            exit 1
          fi

      - name: Promote tracking cards
        uses: PupFuzz/agent-board-toolkit/promote@f48d8a692a45428dbbca1f419e17592e4d057845  # v0.11.0
        with:
          writeback-token: ${{ secrets.KANBAN_WRITEBACK_TOKEN }}
          expected-host: ${{ vars.KANBAN_EXPECTED_HOST }}
          api-base: ${{ vars.KANBAN_API_BASE }}
          dls: ${{ github.event.inputs.dls }}
          dry-run: ${{ github.event.inputs.dry_run }}

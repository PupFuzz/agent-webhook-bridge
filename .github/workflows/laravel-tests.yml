name: Laravel Tests

# CI for the v0.12 Laravel app (the sole test workflow since the Python tree
# was removed in Phase 3). Three checks: Pint (style), PHPStan/larastan level 7
# on app/Bridge, and PHPUnit on the verified Laravel↔PHPUnit↔PHP matrix
# (Laravel 13 / PHPUnit 12 / PHP 8.5) across SQLite + MariaDB 10.6 + MariaDB 11.
#
# Shared runtime setup (PHP + composer + .env) lives in the local composite
# action .github/actions/setup-app so the SQLite and MariaDB jobs can't drift.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
    # NO paths filter — deliberately. These three jobs are REQUIRED status checks
    # in dev/main branch protection, so they must run and report on EVERY PR. A
    # paths-ignore (e.g. skipping docs-only PRs) makes the required check never
    # report on those PRs, which permanently BLOCKS them. The suite is fast
    # (~30s/job); running it on a docs PR is cheaper than the block. Don't re-add
    # a paths filter without also dropping these from the required-checks set.

# Cancel in-flight CI on rapid PR pushes; push events to main/dev run to
# completion (matches the Python Tests/Security workflows).
concurrency:
  group: laravel-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  phpunit:
    name: PHPUnit + Pint + PHPStan (PHP 8.3, SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: ./.github/actions/setup-app

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPStan (app/Bridge, level 7)
        run: vendor/bin/phpstan analyse -c phpstan-laravel.neon --no-progress

      - name: Doc-sync (CLAUDE_*.md PHP references resolve)
        run: php bin/check-doc-refs.php

      - name: PHPUnit (SQLite in-memory)
        run: vendor/bin/phpunit

  phpunit-mariadb:
    name: PHPUnit (MariaDB ${{ matrix.mariadb }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mariadb: ["10.6", "11"]

    services:
      mariadb:
        image: mariadb:${{ matrix.mariadb }}
        env:
          MARIADB_ROOT_PASSWORD: ci_root_password
          MARIADB_DATABASE: agent_webhook_bridge_ci
          MARIADB_USER: ci_user
          MARIADB_PASSWORD: ci_user_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=15

    env:
      # Override phpunit.xml's sqlite default (non-forced <env> entries, so
      # the real environment wins) to exercise the MariaDB driver path.
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: agent_webhook_bridge_ci
      DB_USERNAME: ci_user
      DB_PASSWORD: ci_user_password

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: ./.github/actions/setup-app

      - name: Verify MariaDB connectivity
        run: php artisan db:show

      - name: PHPUnit (MariaDB)
        run: vendor/bin/phpunit

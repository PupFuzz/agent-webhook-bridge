name: Security

# Runs on every push to main + every PR: gitleaks committed-secret scanner +
# composer audit (Composer dependency CVEs). (The Python pip-audit job was
# removed with the v0.12 Laravel rewrite — DL-001; dependabot also files PRs for
# vulnerable deps, composer audit catches them at PR/nightly time.)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  # Re-run nightly so a newly-disclosed CVE in an unchanged dep is caught
  # even when the codebase isn't being modified.
  schedule:
    - cron: "37 4 * * *"   # 04:37 UTC daily (off-peak)

# Cancel in-flight CI on rapid PR pushes; push events to main/dev run
# to completion (in-history-commit SHAs MUST be scanned).
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    name: gitleaks (committed-secret scan)
    runs-on: ubuntu-latest
    # gitleaks-action calls the PR-commits API to produce diff context
    # in the scan report; without these permissions it 403s on PR runs.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Scan full history on pushes to main; scan PR diff on PRs.
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  composer-audit:
    name: composer audit (dependency CVEs)
    # Surfaces a known CVE in a Composer dependency at PR time (and nightly via
    # the schedule above) rather than waiting for a dependabot alert. (B-16,
    # architecture review.)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # 2.37.2
        with:
          php-version: '8.5'
          tools: composer
          coverage: none
      # `--locked`: audit composer.lock directly — without it (and with no
      # `composer install`/vendor/) `composer audit` prints "No packages -
      # skipping audit" and exits 0, an inert gate.
      - name: composer audit
        run: composer audit --locked --no-interaction

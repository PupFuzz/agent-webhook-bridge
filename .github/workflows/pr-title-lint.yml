name: PR title correlation-key lint

# A PR whose head branch follows the <type>/<card-id>-slug convention MUST carry
# a `card#<id>` or `DL-NNNN` token in its title. That token is the ONLY key the
# card-movement writeback has to correlate a merged PR back to its tracking card;
# without it the card silently never moves. The convention was empirically
# skipped (wave-1 2026-07-08: 8 PRs, zero automated card moves), so this converts
# the silent "card never moves" into a loud red check with an actionable message
# — the same silent->loud conversion as the release drift-gate.
#
# SCOPE / LIMITS (cannot be solved here — do not try):
#   - Token-presence lint only: it cannot verify the id resolves to a real card,
#     or to the RIGHT card.
#   - A cross-board work item (a board-12 card implemented via a kanban/bridge PR,
#     e.g. #3765 itself) passes this lint but still will not auto-move —
#     correlation is deliberately board-scoped 1:1 per repo (DL-174). This checks
#     the convention, not end-to-end card movement.
#   - NOT a required status check: it always runs, but the enforcement teeth are
#     the all-workflows-green dev-PR merge rule (CLAUDE.md rule 5), consistent
#     with the drift-gate.
#
# SECURITY: PR title and branch name are PR-author-controlled. They reach the
# script ONLY via the env: block and are used quoted ("$TITLE"/"$BRANCH") — never
# interpolated as ${{ }} inside the run: body (Actions script-injection class).
# See CLAUDE_DECISIONS.md DL-182.

on:
  pull_request:
    # "edited" is load-bearing: a title fix must re-run the check. "synchronize"
    # cannot change the title or branch name, so it is intentionally omitted.
    types: [opened, edited, reopened]

permissions:
  contents: read

jobs:
  lint-title:
    # No checkout — the job reads only the event payload.
    runs-on: ubuntu-latest
    steps:
      - name: Require card#/DL token for card-id branches
        # Explicit bash: the script uses pipefail + [[ =~ ]], and a self-hosted
        # runner without bash on PATH would otherwise silently fall back to sh.
        shell: bash
        env:
          TITLE: ${{ github.event.pull_request.title }}
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          # Non-feature branches carry no card id — skip (pass).
          case "$BRANCH" in
            dependabot/*|release/*|sync/*|revert-*)
              echo "Branch '$BRANCH' is exempt (automation/release/revert) — skipping."
              exit 0
              ;;
          esac

          # The <type>/<card-id>-slug convention: a lowercase type segment, a
          # numeric card id, then a hyphen. Anything else has no card id to enforce.
          if [[ ! "$BRANCH" =~ ^[a-z-]+/[0-9]+- ]]; then
            echo "Branch '$BRANCH' does not follow <type>/<card-id>-slug — no card id to enforce, skipping."
            exit 0
          fi

          # Extract the card id: drop the leading "type/", then keep the digits
          # up to the first hyphen.
          card_id="${BRANCH#*/}"
          card_id="${card_id%%-*}"

          # Accept a genuine "card#<exact-id>" or "DL-<1-4 digits>" token, bounded
          # on BOTH sides so a coincidental substring does not satisfy the check:
          # the leading (^|[^0-9A-Za-z]) rejects tails like "IDL-2"/"discard#3770",
          # and the trailing ([^0-9]|$) rejects a longer id like "card#37700".
          if [[ "$TITLE" =~ (^|[^0-9A-Za-z])card#${card_id}([^0-9]|$) ]] || [[ "$TITLE" =~ (^|[^0-9A-Za-z])DL-[0-9]{1,4}([^0-9]|$) ]]; then
            echo "OK: title carries a correlation token for card $card_id."
            exit 0
          fi

          echo "::error::PR title is missing a card-movement correlation token."
          echo "Branch '$BRANCH' targets card $card_id, but the title carries neither 'card#$card_id' nor a 'DL-NNNN' token."
          echo "The writeback uses this token as its ONLY key to move the tracking card; without it the card silently never moves."
          echo "Fix: add 'card#$card_id' or the relevant 'DL-NNNN' to the PR title, then re-save (the 'edited' event re-runs this check)."
          exit 1
